<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#010416" />
    <meta name="color-scheme" content="dark" />
    <title>Termweave</title>
  </head>
  <body>
    <section id="diagnostics" aria-label="Production diagnostics" hidden>
      <header id="diagnostic-header">
        <strong>PRODUCTION DIAGNOSTICS</strong>
        <span id="diagnostic-status">HTML loaded; waiting for JavaScript…</span>
        <button id="diagnostic-copy" type="button">Copy</button>
        <button id="diagnostic-clear" type="button">Clear</button>
      </header>
      <pre id="diagnostic-log">[HTML] Diagnostic panel rendered.</pre>
    </section>
    <main id="app">
      <div id="display-stage">
        <div id="monitor-artboard">
          <div id="monitor-surround" aria-hidden="true">
            <div class="monitor-copy monitor-copy--diagonal monitor-copy--top-left"></div>
            <div class="monitor-copy monitor-copy--vertical monitor-copy--top"></div>
            <div class="monitor-copy monitor-copy--diagonal monitor-copy--top-right"></div>
            <div class="monitor-copy monitor-copy--horizontal monitor-copy--left"></div>
            <div class="monitor-copy monitor-copy--horizontal monitor-copy--right"></div>
            <div class="monitor-copy monitor-copy--diagonal monitor-copy--bottom-left"></div>
            <div class="monitor-copy monitor-copy--vertical monitor-copy--bottom"></div>
            <div class="monitor-copy monitor-copy--diagonal monitor-copy--bottom-right"></div>
          </div>
          <div id="terminal" aria-label="Termweave terminal"></div>
          <div id="crt-effects" aria-hidden="true">
            <div id="crt-aberration" hidden>
              <canvas id="crt-aberration-canvas"></canvas>
            </div>
            <div id="crt-noise"></div>
            <div id="crt-sweep"></div>
          </div>
          <div id="monitor-overlay" aria-hidden="true"></div>
        </div>
      </div>
    </main>
    <script type="module" src="/src/diagnostics.ts"></script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
